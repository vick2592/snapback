<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickReload</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <div class="brand">
      <div class="logo">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Circular arrow -->
          <path
            d="M18 4C10.268 4 4 10.268 4 18s6.268 14 14 14 14-6.268 14-14"
            stroke="#4f8ef7"
            stroke-width="2.5"
            stroke-linecap="round"
          />
          <!-- Arrowhead -->
          <polyline points="28,4 32,8 28,12" stroke="#4f8ef7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
          <!-- Lightning bolt -->
          <path d="M20 10l-5 8h4l-1 8 5-8h-4z" fill="#4f8ef7" />
        </svg>
      </div>
      <div class="title-group">
        <span class="title">QuickReload</span>
        <span class="tagline">Instant reload, zero wait.</span>
      </div>
    </div>

    <button id="reloadBtn" class="reload-btn">
      ⚡ Quick Reload
    </button>

    <p class="hint">Works on any page.</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
